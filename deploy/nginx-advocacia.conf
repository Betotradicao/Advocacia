# ============================================================
#  Carlos Eduardo Ferreira Advocacia
#  Configuração nginx — substitui os .htaccess, que o nginx ignora.
#
#  Instalar em:  /etc/nginx/sites-available/advocacia
#  Ativar com:   ln -s /etc/nginx/sites-available/advocacia \
#                      /etc/nginx/sites-enabled/advocacia
#                nginx -t && systemctl reload nginx
# ============================================================

server {
    listen 80;
    listen [::]:80;

    server_name carloseduardoferreiraadv.com.br www.carloseduardoferreiraadv.com.br;

    root /var/www/advocacia;
    index index.php;

    charset utf-8;
    client_max_body_size 10M;   # acompanha o limite de 8 MB do upload de imagens

    access_log /var/log/nginx/advocacia.access.log;
    error_log  /var/log/nginx/advocacia.error.log;

    # ----------------------------------------------------
    #  Cabeçalhos de segurança
    # ----------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ----------------------------------------------------
    #  Conteúdo e código interno — nunca acessíveis pela web
    #
    #  O prefixo ^~ tem precedência sobre as regras por expressão
    #  regular, então nada aqui chega ao PHP-FPM.
    # ----------------------------------------------------
    location ^~ /data/     { deny all; return 404; }
    location ^~ /includes/ { deny all; return 404; }
    location ^~ /deploy/   { deny all; return 404; }
    location ^~ /.git      { deny all; return 404; }

    # Arquivos ocultos e sobras de edição
    location ~ /\.          { deny all; return 404; }
    location ~ ~$           { deny all; return 404; }

    # ----------------------------------------------------
    #  Imagens enviadas pelo painel
    #
    #  Esta é a proteção mais importante do arquivo. O envio já
    #  valida que o arquivo é uma imagem de verdade, mas um JPEG
    #  válido pode carregar código PHP colado no fim. Como este
    #  bloco usa ^~, a regra de .php abaixo nunca é avaliada aqui:
    #  o conteúdo só pode ser servido como arquivo estático.
    # ----------------------------------------------------
    location ^~ /assets/uploads/ {
        # Só imagens são entregues; qualquer outra extensão é negada.
        location ~* \.(jpe?g|png|webp|gif|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
        deny all;
        return 404;
    }

    # ----------------------------------------------------
    #  PHP
    # ----------------------------------------------------
    location ~ \.php$ {
        try_files $uri =404;                      # impede path info injection
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60s;
    }

    # ----------------------------------------------------
    #  Estáticos do site
    # ----------------------------------------------------
    location ~* \.(jpe?g|png|webp|gif|ico|svg|css|js|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ----------------------------------------------------
    #  Compressão
    # ----------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json image/svg+xml;
}

# ============================================================
#  Depois de emitir o certificado, o certbot reescreve este
#  arquivo sozinho: cria o bloco 443 com SSL e transforma o
#  bloco acima em redirecionamento para HTTPS.
#
#      certbot --nginx -d carloseduardoferreiraadv.com.br \
#                      -d www.carloseduardoferreiraadv.com.br
#
#  Não é preciso editar nada à mão.
# ============================================================
